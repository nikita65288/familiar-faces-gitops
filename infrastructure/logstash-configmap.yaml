apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: familiar-faces
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "familiar-faces-logs-%{+YYYY.MM.dd}"
      }
    }
