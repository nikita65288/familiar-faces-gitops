apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: familiar-faces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: auth-service
        image: ghcr.io/nikita65288/auth-service:latest 
        ports:
        - containerPort: 9000 #
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_CONFIG_IMPORT
          value: "configserver:http://config-service:8888/"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        - name: JWT_EXPIRATION
          value: "86400000"
        - name: DB_HOST
          value: "postgres"
        # Get credentials from cluster Secrets
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: universal-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: universal-password 
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0"
        resources:
          limits:
            memory: "1Gi"
          requests:
            memory: "512Mi"                
