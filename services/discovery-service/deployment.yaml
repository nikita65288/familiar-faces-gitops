apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: familiar-faces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
      - name: discovery-service
        image: ghcr.io/nikita65288/discovery-service:latest
        ports:
        - containerPort: 8761
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
