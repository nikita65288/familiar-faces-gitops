apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: familiar-faces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: discovery-service
        image: ghcr.io/nikita65288/discovery-service:latest
        ports:
        - containerPort: 8761
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: JAVA_TOOL_OPTIONS
          value: "-XX:MaxRAMPercentage=75.0"
        resources:
          limits:
            memory: "512Mi" 
          requests:
            memory: "256Mi"
