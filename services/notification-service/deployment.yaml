apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: familiar-faces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: ghcr.io/nikita65288/notification-service:latest
        ports:
        - containerPort: 9003
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_CLOUD_CONFIG_URI
          value: "http://config-service:8888"
