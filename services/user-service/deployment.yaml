apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: familiar-faces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: user-service
        image: ghcr.io/nikita65288/user-service:latest
        ports:
        - containerPort: 9001
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_CONFIG_IMPORT
          value: "configserver:http://config-service:8888/"
        - name: DB_HOST
          value: "postgres"
        # Get credentials from cluster Secrets
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: universal-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: universal-password 
        - name: JAVA_TOOL_OPTIONS
          value: "-Dlogstash.destination=logstash:5044 -XX:MaxRAMPercentage=75.0"
        resources:
          limits:
            memory: "1Gi"
          requests:
            memory: "512Mi"  
